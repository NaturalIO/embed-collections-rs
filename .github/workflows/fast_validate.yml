name: fast-validate
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - uses: taiki-e/install-action@nextest

    - name: no_std build check
      run: make build

    - name: test
      run: make test

    - name: test
      run: make test-release

    - name: Clippy with default
      run: make clippy
