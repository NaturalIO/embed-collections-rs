[package]
name = "embed-collections"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "A collection of intrusive data structures (linked lists) for Rust, supporting various pointer types."
keywords = ["intrusive", "linked-list", "collection"]
categories = ["data-structures", "no-std"]
homepage = "https://github.com/NaturalIO/embed-collections-rs"

[features]
default = ["std", "full"]
std = []
slist = []
dlist = []
avl = []
seglist = []
full = ["slist", "dlist", "avl", "seglist"]

[dependencies]

[dev-dependencies]
rstest = "0"
rand = "0.8.5"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "avl"
harness = false
required-features = ["avl"]

[[bench]]
name = "range_tree"
harness = false
required-features = ["avl"]

[package.metadata.docs.rs]
all-features = true
# enable features in the documentation
rustdoc-args = ["--cfg", "docsrs"]

[lints.clippy]
new_ret_no_self = "allow"
needless_range_loop = "allow"
type_complexity = "allow"
mut_from_ref = "allow"
transmute_ptr_to_ref = "allow"
len_without_is_empty = "allow"
new_without_default = "allow"
result_unit_err = "allow"
